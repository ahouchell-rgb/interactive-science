<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RP: Waves — AQA Physics Paper 2</title>
<style>
  :root{
    --navy:#1e3a5f; --navy-dark:#0f2540; --navy-light:#2c5282;
    --teal:#0d9488; --teal-light:#14b8a6; --teal-pale:#ccfbf1;
    --bg:#f4f7fb; --panel:#ffffff; --text:#1a202c; --muted:#64748b;
    --border:#d6dee9; --good:#16a34a; --good-pale:#dcfce7;
    --bad:#dc2626; --bad-pale:#fee2e2; --warn:#b45309; --warn-pale:#fef3c7;
    --steel:#64748b;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  body{display:flex;flex-direction:column;}
  header{background:var(--navy);color:#fff;padding:14px 26px;display:flex;align-items:center;justify-content:space-between;gap:16px;border-bottom:4px solid var(--navy-dark);flex-wrap:wrap;}
  header .brand{display:flex;align-items:baseline;gap:14px;}
  header h1{font-size:21px;font-weight:700;letter-spacing:.2px;}
  header .sub{font-size:12px;color:#bcd0e8;}
  .spec-tag{background:rgba(255,255,255,.12);padding:5px 12px;border-radius:5px;font-size:12px;font-weight:600;letter-spacing:.3px;}
  .topbar{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;padding:12px 26px 0;background:var(--bg);flex-wrap:wrap;}
  .tabs{display:flex;gap:6px;}
  .tab{border:1px solid var(--border);border-bottom:none;background:#e8eef6;color:var(--navy);padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;border-radius:8px 8px 0 0;}
  .tab[aria-selected="true"]{background:var(--panel);color:var(--teal);box-shadow:0 -2px 0 var(--teal) inset;}
  .tab:focus-visible{outline:3px solid var(--teal-light);outline-offset:2px;}
  .exptbar{display:flex;gap:6px;background:#eef2f7;padding:4px;border-radius:9px;margin-bottom:6px;}
  .exptbtn{border:none;background:transparent;padding:8px 16px;font-size:13px;font-weight:700;color:var(--muted);border-radius:6px;cursor:pointer;font-family:inherit;}
  .exptbtn[aria-selected="true"]{background:var(--panel);color:var(--navy);box-shadow:0 1px 3px rgba(0,0,0,.12);}
  .exptbtn:focus-visible{outline:2px solid var(--teal-light);outline-offset:2px;}
  main{flex:1;padding:0 26px 28px;}
  .view{display:none;} .view.active{display:block;}
  .walk{display:grid;grid-template-columns:1fr 360px;gap:0;background:var(--panel);border:1px solid var(--border);border-radius:0 10px 10px 10px;overflow:hidden;min-height:520px;}
  .stage{background:linear-gradient(180deg,#eaf1f8 0%,#dde8f3 100%);position:relative;display:flex;align-items:center;justify-content:center;padding:16px;}
  .stage svg{width:100%;height:auto;max-height:520px;}
  .side{border-left:1px solid var(--border);display:flex;flex-direction:column;}
  .side-head{background:var(--navy);color:#fff;padding:14px 18px;}
  .side-head .step-no{font-size:12px;letter-spacing:1px;color:var(--teal-light);font-weight:700;}
  .side-head .step-title{font-size:18px;font-weight:700;margin-top:3px;}
  .side-body{padding:18px;flex:1;font-size:14.5px;line-height:1.55;}
  .side-body p{margin-bottom:12px;}
  .vartag{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.4px;padding:3px 9px;border-radius:4px;margin:0 4px 6px 0;}
  .iv{background:var(--teal-pale);color:#0f766e;} .dv{background:#e0e7ff;color:#3730a3;} .cv{background:#f1f5f9;color:#475569;}
  .note{border-left:4px solid var(--teal);background:#f0fdfa;padding:9px 12px;border-radius:0 6px 6px 0;font-size:13px;color:#115e59;margin-top:4px;}
  .note.exam{border-left-color:var(--warn);background:var(--warn-pale);color:#7c4a03;}
  .note b:first-child{display:block;font-size:11px;letter-spacing:.5px;text-transform:uppercase;margin-bottom:2px;}
  .equation{font-size:20px;font-weight:700;color:var(--navy);background:#eef4fb;border:1px solid var(--border);border-radius:7px;padding:8px 14px;text-align:center;margin:4px 0 12px;letter-spacing:.5px;}
  .controls{border-top:1px solid var(--border);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:10px;background:#f8fafc;}
  .btn{border:none;border-radius:7px;padding:11px 18px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:transform .05s;}
  .btn:active{transform:translateY(1px);} .btn:focus-visible{outline:3px solid var(--teal-light);outline-offset:2px;}
  .btn-primary{background:var(--teal);color:#fff;} .btn-primary:hover{background:var(--teal-light);}
  .btn-ghost{background:#e8eef6;color:var(--navy);} .btn-ghost:hover{background:#dbe5f1;}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  .dots{display:flex;gap:7px;}
  .dot{width:10px;height:10px;border-radius:50%;background:var(--border);cursor:pointer;}
  .dot.on{background:var(--teal);transform:scale(1.25);}
  .dot:focus-visible{outline:2px solid var(--teal-light);outline-offset:2px;}
  .order{background:var(--panel);border:1px solid var(--border);border-radius:0 10px 10px 10px;padding:22px 24px;}
  .order-head{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:6px;}
  .order-head h2{font-size:18px;color:var(--navy);}
  .order-intro{font-size:14px;color:var(--muted);margin-bottom:16px;max-width:640px;line-height:1.5;}
  .modebar{display:flex;gap:6px;background:#eef2f7;padding:4px;border-radius:9px;}
  .modebtn{border:none;background:transparent;padding:8px 16px;font-size:13px;font-weight:700;color:var(--muted);border-radius:6px;cursor:pointer;font-family:inherit;}
  .modebtn[aria-selected="true"]{background:var(--panel);color:var(--teal);box-shadow:0 1px 3px rgba(0,0,0,.1);}
  .modebtn:focus-visible{outline:2px solid var(--teal-light);outline-offset:2px;}
  .steplist{list-style:none;display:flex;flex-direction:column;gap:10px;margin:18px 0;max-width:760px;}
  .step-card{display:flex;align-items:center;gap:14px;background:#fff;border:1px solid var(--border);border-left:5px solid var(--steel);border-radius:9px;padding:13px 16px;cursor:grab;user-select:none;touch-action:none;box-shadow:0 1px 2px rgba(15,37,64,.05);}
  .step-card:active{cursor:grabbing;}
  .step-card.dragging{opacity:.85;box-shadow:0 10px 24px rgba(15,37,64,.22);border-color:var(--teal);transform:scale(1.01);}
  .grip{color:#6b7280;font-size:18px;line-height:1;letter-spacing:-2px;flex-shrink:0;}
  .pos{width:28px;height:28px;border-radius:50%;background:var(--navy);color:#fff;font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .step-text{font-size:14.5px;line-height:1.45;flex:1;}
  .step-card.correct{border-left-color:var(--good);background:var(--good-pale);}
  .step-card.wrong{border-left-color:var(--bad);background:var(--bad-pale);}
  .mark{flex-shrink:0;font-size:18px;font-weight:700;width:22px;text-align:center;}
  .mark.ok{color:var(--good);} .mark.no{color:var(--bad);}
  .order-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  .result{font-size:14px;font-weight:700;padding:10px 16px;border-radius:8px;display:none;}
  .result.show{display:block;}
  .result.win{background:var(--good-pale);color:#166534;} .result.part{background:var(--warn-pale);color:#854d0e;}
  @media(max-width:900px){.walk{grid-template-columns:1fr;}.side{border-left:none;border-top:1px solid var(--border);}}
</style>
</head>
<body>
<header>
  <div class="brand">
    <h1>Required Practical · Waves</h1>
    <span class="sub">Measure wavelength and frequency, then find the wave speed</span>
  </div>
  <span class="spec-tag">AQA Combined Science: Trilogy · Physics Paper 2</span>
</header>

<div class="topbar">
  <div class="tabs" role="tablist">
    <button class="tab" id="tab-walk" role="tab" aria-selected="true" aria-controls="view-walk">Walk the method</button>
    <button class="tab" id="tab-order" role="tab" aria-selected="false" aria-controls="view-order">Order the method</button>
  </div>
  <div class="exptbar" role="tablist" aria-label="Choose experiment">
    <button class="exptbtn" id="e-ripple" role="tab" aria-selected="true">Ripple tank (water waves)</button>
    <button class="exptbtn" id="e-string" role="tab" aria-selected="false">Waves on a string</button>
  </div>
</div>

<main>
  <section class="view active" id="view-walk" role="tabpanel" aria-labelledby="tab-walk">
    <div class="walk">
      <div class="stage">
        <svg id="scene" viewBox="0 0 560 420" xmlns="http://www.w3.org/2000/svg" aria-label="Waves apparatus">
          <defs>
            <linearGradient id="boxG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#475569"/><stop offset="1" stop-color="#1e293b"/></linearGradient>
            <linearGradient id="waterG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#7dd3fc"/><stop offset="1" stop-color="#0ea5e9"/></linearGradient>
            <linearGradient id="massG3" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#94a3b8"/><stop offset="1" stop-color="#475569"/></linearGradient>
            <clipPath id="screenClip"><rect x="118" y="296" width="324" height="40"/></clipPath>
          </defs>

          <!-- ================= RIPPLE TANK ================= -->
          <g id="gRipple">
            <!-- signal generator -->
            <rect x="36" y="48" width="92" height="46" rx="6" fill="url(#boxG)"/>
            <rect x="46" y="58" width="50" height="18" rx="2" fill="#0b3d2e"/>
            <text x="71" y="71" font-size="10" fill="#34d399" text-anchor="middle" font-family="Consolas,monospace" id="rFreq">12 Hz</text>
            <text x="82" y="106" font-size="9" fill="#475569" text-anchor="middle">signal generator</text>
            <!-- lamp -->
            <circle cx="280" cy="58" r="16" fill="#fde68a" stroke="#f59e0b" stroke-width="2"/>
            <path d="M280 74 L255 120 L305 120 Z" fill="#fef3c7" opacity="0.5"/>
            <text x="280" y="40" font-size="9" fill="#475569" text-anchor="middle">lamp</text>
            <!-- tank (side view) -->
            <rect x="150" y="130" width="260" height="40" rx="4" fill="#bae6fd" stroke="#0369a1" stroke-width="2"/>
            <rect x="152" y="146" width="256" height="22" rx="2" fill="url(#waterG)" opacity=".85"/>
            <!-- dipper / vibrating beam -->
            <rect x="240" y="120" width="80" height="8" rx="2" fill="#334155"/>
            <line x1="280" y1="128" x2="280" y2="146" stroke="#334155" stroke-width="2"/>
            <text x="280" y="118" font-size="9" fill="#475569" text-anchor="middle">vibrating beam (dipper)</text>
            <!-- wire generator->beam -->
            <path d="M128 70 C 200 70, 220 110, 250 121" fill="none" stroke="#0d9488" stroke-width="1.4"/>
            <!-- screen with moving wavefront bands -->
            <rect x="116" y="294" width="328" height="44" rx="4" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
            <g clip-path="url(#screenClip)"><g id="rBands"></g></g>
            <text x="280" y="356" font-size="9" fill="#475569" text-anchor="middle">screen — projected wavefronts</text>
            <!-- ruler + 10λ bracket (measure step) -->
            <g id="rMeasure" opacity="0">
              <path id="rBracket" d="M132 286 L132 280 L412 280 L412 286" fill="none" stroke="var(--bad)" stroke-width="1.6"/>
              <text x="272" y="274" font-size="11" font-weight="700" fill="var(--bad)" text-anchor="middle">measure 10 λ, then ÷ 10</text>
            </g>
            <text x="280" y="240" font-size="13" font-weight="700" fill="#1e3a5f" text-anchor="middle" id="rTitle">Waves spread across the tank surface</text>
          </g>

          <!-- ================= WAVES ON A STRING ================= -->
          <g id="gString" style="display:none">
            <!-- signal generator -->
            <rect x="30" y="150" width="78" height="44" rx="6" fill="url(#boxG)"/>
            <rect x="40" y="160" width="44" height="16" rx="2" fill="#0b3d2e"/>
            <text x="62" y="172" font-size="9" fill="#34d399" text-anchor="middle" font-family="Consolas,monospace" id="sFreq">30 Hz</text>
            <text x="69" y="206" font-size="9" fill="#475569" text-anchor="middle">signal generator</text>
            <!-- vibration generator -->
            <rect x="112" y="158" width="34" height="40" rx="4" fill="#334155"/>
            <circle cx="129" cy="178" r="6" fill="#94a3b8"/>
            <text x="129" y="214" font-size="9" fill="#475569" text-anchor="middle">vibration generator</text>
            <!-- string + standing wave -->
            <polyline id="sWave" fill="none" stroke="#0d9488" stroke-width="2.6"/>
            <line x1="146" y1="178" x2="146" y2="178" stroke="#0d9488" stroke-width="2"/>
            <!-- pulley -->
            <circle cx="470" cy="178" r="11" fill="#cbd5e1" stroke="#64748b" stroke-width="2"/>
            <circle cx="470" cy="178" r="3" fill="#475569"/>
            <!-- bench edge -->
            <rect x="470" y="178" width="6" height="0" fill="none"/>
            <!-- string down to masses -->
            <line x1="481" y1="178" x2="481" y2="250" stroke="#334155" stroke-width="1.6"/>
            <g id="sHolder"><rect x="471" y="250" width="20" height="6" rx="1.5" fill="#475569"/>
              <rect x="473" y="258" width="16" height="8" rx="1.5" fill="url(#massG3)"/>
              <rect x="473" y="267" width="16" height="8" rx="1.5" fill="url(#massG3)"/></g>
            <text x="481" y="290" font-size="9" fill="#475569" text-anchor="middle">masses (tension)</text>
            <!-- ruler + loop bracket -->
            <g id="sMeasure" opacity="0">
              <path id="sBracket" d="M150 210 L150 216 L260 216 L260 210" fill="none" stroke="var(--bad)" stroke-width="1.6"/>
              <text x="205" y="232" font-size="11" font-weight="700" fill="var(--bad)" text-anchor="middle">one loop = ½ λ</text>
            </g>
            <text x="300" y="120" font-size="13" font-weight="700" fill="#1e3a5f" text-anchor="middle" id="sTitle">A standing wave forms on the string</text>
          </g>

          <!-- v = f λ readout (calc step, shared) -->
          <g id="calcBox" opacity="0">
            <rect x="170" y="362" width="220" height="42" rx="8" fill="#eef4fb" stroke="var(--teal)" stroke-width="1.5"/>
            <text x="280" y="382" font-size="15" font-weight="700" fill="#1e3a5f" text-anchor="middle">wave speed  v = f λ</text>
            <text x="280" y="397" font-size="11" fill="#475569" text-anchor="middle">v in m/s · f in Hz · λ in m</text>
          </g>
        </svg>
      </div>

      <div class="side">
        <div class="side-head">
          <div class="step-no" id="w-no"></div>
          <div class="step-title" id="w-title"></div>
        </div>
        <div class="side-body" id="w-body"></div>
        <div class="controls">
          <button class="btn btn-ghost" id="w-prev">‹ Back</button>
          <div class="dots" id="w-dots" role="group" aria-label="Jump to step"></div>
          <button class="btn btn-primary" id="w-next">Next ›</button>
        </div>
      </div>
    </div>
  </section>

  <section class="view" id="view-order" role="tabpanel" aria-labelledby="tab-order">
    <div class="order">
      <div class="order-head">
        <h2 id="order-title">Put the method in the correct order</h2>
        <div class="modebar" role="tablist" aria-label="Mode">
          <button class="modebtn" id="m-mark" role="tab" aria-selected="true">Self-mark</button>
          <button class="modebtn" id="m-free" role="tab" aria-selected="false">Free reorder</button>
        </div>
      </div>
      <p class="order-intro" id="order-intro"></p>
      <ul class="steplist" id="steplist" aria-label="Method steps"></ul>
      <div class="order-actions">
        <button class="btn btn-primary" id="o-check">Check order</button>
        <button class="btn btn-ghost" id="o-shuffle">Shuffle</button>
        <div class="result" id="o-result" role="status" aria-live="polite"></div>
      </div>
    </div>
  </section>
</main>

<script>
const $=s=>document.querySelector(s);
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
const reduced=window.matchMedia('(prefers-reduced-motion: reduce)').matches;

/* tabs */
const tabs=[['tab-walk','view-walk'],['tab-order','view-order']];
tabs.forEach(([t,v])=>{$('#'+t).addEventListener('click',()=>{tabs.forEach(([tt,vv])=>{const on=tt===t;$('#'+tt).setAttribute('aria-selected',on);$('#'+vv).classList.toggle('active',on);});});});

/* ---------------- experiment data ---------------- */
const DATA={
  ripple:{
    steps:[
      {no:'SET-UP',title:'Set up the ripple tank',run:false,measure:false,calc:false,
       body:`<p>Fill a <b>ripple tank</b> with shallow water. Put a <b>lamp</b> above it and a <b>white screen</b> below — the waves cast moving shadows on the screen.</p><div class="equation">v = f λ</div>`},
      {no:'STEP 1 · SWITCH ON',title:'Make the waves',run:true,measure:false,calc:false,
       body:`<p>Switch on the <b>vibrating beam (dipper)</b>. It sends straight waves across the surface. Their shadows move across the screen below.</p>`},
      {no:'STEP 2 · FREEZE',title:'Freeze the pattern',run:false,measure:false,calc:false,
       body:`<p>The waves move too fast to measure. Use a <b>strobe</b> (or a phone in slow-motion) to <b>freeze</b> the pattern so it appears to stand still.</p>
       <div class="note"><b>Why freeze it?</b>You cannot lay a ruler on a moving pattern. Freezing it makes the wavelength measurable.</div>`},
      {no:'STEP 3 · MEASURE λ',title:'Measure the wavelength',run:false,measure:true,calc:false,
       body:`<p>Lay a ruler on the screen and measure the length of <b>10 wavelengths</b>, then <b>divide by 10</b>.</p>
       <div class="note exam"><b>Why 10, not 1?</b>Measuring across many wavelengths and dividing <b>reduces the percentage error</b> in the measurement. A common exam mark.</div>`},
      {no:'STEP 4 · FREQUENCY',title:'Find the frequency',run:true,measure:false,calc:false,
       body:`<p>Read the <b>frequency</b> straight off the <b>signal generator</b> driving the dipper (or count the waves passing a point each second).</p>
       <span class="vartag" style="background:#e0e7ff;color:#3730a3;">frequency (Hz)</span>`},
      {no:'STEP 5 · CALCULATE',title:'Calculate the wave speed',run:false,measure:false,calc:true,
       body:`<p>Put your wavelength and frequency into the equation.</p>
       <div class="note"><b>v = f λ</b>Speed (m/s) = frequency (Hz) × wavelength (m). Watch the units — convert cm to m first.</div>`}
    ],
    order:[
      "Set up the ripple tank with shallow water; put a lamp above and a white screen below.",
      "Switch on the vibrating beam to send waves across the water.",
      "Use a strobe (or phone slow-motion) to freeze the wave pattern on the screen.",
      "Measure the length of 10 wavelengths with a ruler, then divide by 10.",
      "Find the frequency from the signal generator (or count waves passing a point each second).",
      "Calculate the wave speed using v = f λ."
    ]
  },
  string:{
    steps:[
      {no:'SET-UP',title:'Set up the string',run:false,measure:false,calc:false,
       body:`<p>Connect a <b>signal generator</b> to a <b>vibration generator</b>. Run a string from it, over a <b>pulley</b>, to a <b>mass holder</b> — the hanging masses keep the string under tension.</p><div class="equation">v = f λ</div>`},
      {no:'STEP 1 · TUNE',title:'Find a standing wave',run:true,measure:false,calc:false,
       body:`<p>Switch on and slowly change the <b>frequency</b> until a clear <b>standing wave</b> appears — steady loops with still points (nodes) between them.</p>`},
      {no:'STEP 2 · MEASURE λ',title:'Measure the wavelength',run:true,measure:true,calc:false,
       body:`<p>Measure across <b>several loops</b> with a ruler. <b>One loop = half a wavelength</b>, so measure a few loops and work back to λ.</p>
       <div class="note exam"><b>Reduce the error</b>Measuring across several loops and dividing is more accurate than measuring one — it cuts the percentage error.</div>`},
      {no:'STEP 3 · FREQUENCY',title:'Read the frequency',run:true,measure:false,calc:false,
       body:`<p>Read the <b>frequency</b> directly from the <b>signal generator</b>.</p>
       <span class="vartag" style="background:#e0e7ff;color:#3730a3;">frequency (Hz)</span>`},
      {no:'STEP 4 · CALCULATE',title:'Calculate the wave speed',run:true,measure:false,calc:true,
       body:`<p>Put your wavelength and frequency into the equation.</p>
       <div class="note"><b>v = f λ</b>Speed (m/s) = frequency (Hz) × wavelength (m). Keep λ in metres.</div>`}
    ],
    order:[
      "Connect a signal generator to a vibration generator; run a string over a pulley to a mass holder.",
      "Switch on and adjust the frequency until a clear standing wave forms.",
      "Measure across several loops with a ruler — one loop is half a wavelength.",
      "Read the frequency from the signal generator.",
      "Calculate the wave speed using v = f λ."
    ]
  }
};

/* ---------------- scene build / animation ---------------- */
const WL=28, SCREEN_X=118, SCREEN_W=324;
// build ripple bands (alternating shaded) wide enough to scroll
(function(){let s='';for(let x=-WL;x<SCREEN_X+SCREEN_W+WL;x+=WL){s+=`<rect x="${x}" y="296" width="${WL/2}" height="40" fill="#1e3a5f" opacity="0.55"/>`;}$('#rBands').innerHTML=s;})();

const SX0=146, SX1=460, SLOOPS=3, SMID=178, SAMP=34;
function stringPoints(amp){
  let pts=[];for(let x=SX0;x<=SX1;x+=4){const y=SMID-amp*Math.sin(SLOOPS*Math.PI*(x-SX0)/(SX1-SX0));pts.push(`${x},${y.toFixed(1)}`);}return pts.join(' ');
}

let expt='ripple', wi=0, running=false, rOff=0, t=0;
function frame(){
  t+=0.12;
  if(expt==='ripple'){
    if(running&&!reduced){rOff=(rOff+1.1)%WL;}
    $('#rBands').setAttribute('transform',`translate(${-rOff},0)`);
  }else{
    const amp = running ? (reduced?SAMP:SAMP*Math.sin(t)) : 0;
    $('#sWave').setAttribute('points',stringPoints(amp));
  }
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

/* ---------------- walk render ---------------- */
function steps(){return DATA[expt].steps;}
function renderWalk(){
  const st=steps()[wi];
  $('#w-no').textContent=st.no;$('#w-title').textContent=st.title;$('#w-body').innerHTML=st.body;
  running=st.run;
  $('#calcBox').setAttribute('opacity',st.calc?1:0);
  if(expt==='ripple'){
    $('#rMeasure').setAttribute('opacity',st.measure?1:0);
    $('#rTitle').textContent = st.calc?'Now combine wavelength and frequency' : (st.measure?'Pattern frozen — measure 10 wavelengths':(st.run?'Waves spread across the tank surface':'Tank ready — lamp above, screen below'));
  }else{
    $('#sMeasure').setAttribute('opacity',st.measure?1:0);
    if(!st.run)$('#sWave').setAttribute('points',stringPoints(0));
    $('#sTitle').textContent = st.calc?'Now combine wavelength and frequency':(st.measure?'Measure across the loops':(st.run?'A standing wave forms on the string':'Apparatus ready — masses provide tension'));
  }
  $('#w-dots').querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('on',i===wi));
  $('#w-prev').disabled=wi===0;$('#w-next').disabled=wi===steps().length-1;
}
function buildDots(){$('#w-dots').innerHTML=steps().map((_,i)=>`<button class="dot" aria-label="Step ${i+1}"></button>`).join('');$('#w-dots').querySelectorAll('.dot').forEach((d,i)=>d.addEventListener('click',()=>{wi=i;renderWalk();}));}
$('#w-next').addEventListener('click',()=>{if(wi<steps().length-1){wi++;renderWalk();}});
$('#w-prev').addEventListener('click',()=>{if(wi>0){wi--;renderWalk();}});

/* ---------------- experiment toggle ---------------- */
function setExpt(name){
  expt=name;wi=0;
  $('#e-ripple').setAttribute('aria-selected',name==='ripple');
  $('#e-string').setAttribute('aria-selected',name==='string');
  $('#gRipple').style.display=name==='ripple'?'':'none';
  $('#gString').style.display=name==='string'?'':'none';
  buildDots();renderWalk();buildList();
  $('#order-title').textContent = 'Put the '+(name==='ripple'?'ripple-tank':'string')+' method in order';
}
$('#e-ripple').addEventListener('click',()=>setExpt('ripple'));
$('#e-string').addEventListener('click',()=>setExpt('string'));

/* ---------------- order ---------------- */
const listEl=$('#steplist');let markMode=true;
function orderSteps(){return DATA[expt].order;}
function buildList(){
  const arr=orderSteps();const order=arr.map((t,i)=>({t,i}));
  do{shuffle(order);}while(order.every((o,idx)=>o.i===idx));
  listEl.innerHTML=order.map(o=>(
    `<li class="step-card" data-index="${o.i}" tabindex="0">
       <span class="grip" aria-hidden="true">⋮⋮</span><span class="pos"></span>
       <span class="step-text">${o.t}</span><span class="mark" aria-hidden="true"></span></li>`)).join('');
  renumber();clearMarks();$('#o-result').classList.remove('show','win','part');
}
function renumber(){listEl.querySelectorAll('.step-card').forEach((c,i)=>c.querySelector('.pos').textContent=i+1);}
function clearMarks(){listEl.querySelectorAll('.step-card').forEach(c=>{c.classList.remove('correct','wrong');const m=c.querySelector('.mark');m.textContent='';m.className='mark';});}
let dragging=null;
listEl.addEventListener('pointerdown',e=>{const card=e.target.closest('.step-card');if(!card)return;dragging=card;card.classList.add('dragging');card.setPointerCapture(e.pointerId);clearMarks();$('#o-result').classList.remove('show','win','part');});
listEl.addEventListener('pointermove',e=>{if(!dragging)return;const after=getAfter(e.clientY);if(after==null)listEl.appendChild(dragging);else listEl.insertBefore(dragging,after);renumber();});
function endDrag(){if(dragging){dragging.classList.remove('dragging');dragging=null;}}
listEl.addEventListener('pointerup',endDrag);listEl.addEventListener('pointercancel',endDrag);
function getAfter(y){const els=[...listEl.querySelectorAll('.step-card:not(.dragging)')];return els.reduce((closest,child)=>{const box=child.getBoundingClientRect();const offset=y-box.top-box.height/2;if(offset<0&&offset>closest.offset)return{offset,element:child};return closest;},{offset:-Infinity}).element||null;}
listEl.addEventListener('keydown',e=>{const card=e.target.closest('.step-card');if(!card)return;if(e.key==='ArrowUp'&&card.previousElementSibling){e.preventDefault();listEl.insertBefore(card,card.previousElementSibling);card.focus();renumber();clearMarks();}if(e.key==='ArrowDown'&&card.nextElementSibling){e.preventDefault();listEl.insertBefore(card.nextElementSibling,card);card.focus();renumber();clearMarks();}});
function check(){const cards=[...listEl.querySelectorAll('.step-card')];let correct=0;cards.forEach((c,i)=>{const ok=+c.dataset.index===i;c.classList.toggle('correct',ok);c.classList.toggle('wrong',!ok);const m=c.querySelector('.mark');m.textContent=ok?'✓':'✗';m.className='mark '+(ok?'ok':'no');if(ok)correct++;});const r=$('#o-result');r.classList.add('show');if(correct===cards.length){r.className='result show win';r.textContent='✓ Correct order — measure wavelength, find frequency, then v = f λ.';}else{r.className='result show part';r.textContent=`${correct} of ${cards.length} in the right place. Move the red ones and check again.`;}}
$('#o-check').addEventListener('click',check);
$('#o-shuffle').addEventListener('click',buildList);
function setMode(mark){markMode=mark;$('#m-mark').setAttribute('aria-selected',mark);$('#m-free').setAttribute('aria-selected',!mark);$('#o-check').style.display=mark?'inline-block':'none';$('#order-intro').innerHTML=mark?'Drag the steps into the order you would carry out the experiment. In <b>Self-mark</b> mode, press Check to see which are right. Drag from anywhere on a card — works on a touchscreen or whiteboard too.':'<b>Free reorder</b> mode — no marking. Reorder as a class and talk through why you measure many wavelengths and divide, rather than just one.';clearMarks();$('#o-result').classList.remove('show','win','part');}
$('#m-mark').addEventListener('click',()=>setMode(true));
$('#m-free').addEventListener('click',()=>setMode(false));

/* init */
setExpt('ripple');setMode(true);
</script>
</body>
</html>
