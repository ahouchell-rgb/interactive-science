<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>How Sedimentary Rocks (and Fossils) Form</title>
  <style>
    /* ============================================================
       DESIGN TOKENS — matches Y8 lesson PowerPoint palette
       ============================================================ */
    :root {
      --navy: #1E2761;
      --ink: #1A1A1A;
      --muted: #5C6370;
      --paper: #FFFFFF;
      --warm: #F8F4EC;
      --soft-blue: #EDF2FA;
      --accent: #B85042;
      --accent-bg: #FBE8E4;
      --success: #2C5F2D;
      --success-bg: #E8F3E8;
      --grid: #CFD8E3;

      /* Earth/rock layer colours */
      --rock-base: #6a5040;
      --rock-dark: #4a3828;
      --sediment-coarse: #c8a878;
      --sediment-mid: #b89868;
      --sediment-fine: #a08858;
      --sediment-chalk: #ddd2b8;
      --water: #6a98c0;
      --water-deep: #3a5878;
      --sky: #a8c8e8;
      --sky-dim: #8aa8c8;
      --plant: #5a7838;

      --font: "Century Gothic", "Avenir Next", "Avenir", "Geneva", system-ui, -apple-system, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: var(--font);
      background: var(--paper);
      color: var(--ink);
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      padding: 24px 32px;
      gap: 16px;
    }

    /* ============================================================
       HEADER
       ============================================================ */
    header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      border-bottom: 2px solid var(--grid);
      padding-bottom: 10px;
    }
    body.embed header { display: none; }

    .title-block h1 {
      font-size: 28px;
      color: var(--navy);
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .title-block .subtitle {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: 700;
      margin-top: 2px;
    }

    .header-meta {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 700;
    }

    /* ============================================================
       MAIN LAYOUT
       ============================================================ */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      gap: 28px;
      min-height: 0;
    }

    /* ===== LEFT: scene illustration ===== */
    .scene-wrap {
      background: var(--warm);
      border: 1px solid var(--grid);
      border-radius: 6px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .scene-label {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 8px;
    }

    .scene-svg {
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .scene-svg svg {
      width: 100%;
      height: 100%;
      max-height: 100%;
      transition: opacity 0.35s ease;
    }

    .scene-svg.transitioning svg { opacity: 0.2; }

    /* ===== RIGHT: info panel ===== */
    .info {
      display: flex;
      flex-direction: column;
      min-height: 0;
      gap: 18px;
    }

    .stage-meta {
      padding-bottom: 12px;
      border-bottom: 2px solid var(--grid);
    }

    .stage-number {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .stage-name {
      font-size: 32px;
      color: var(--navy);
      font-weight: 700;
      letter-spacing: -0.5px;
      line-height: 1.05;
    }

    .stage-time {
      font-size: 14px;
      color: var(--accent);
      font-weight: 700;
      margin-top: 4px;
      letter-spacing: 0.5px;
    }

    .stage-tagline {
      font-size: 14px;
      color: var(--muted);
      font-style: italic;
      margin-top: 4px;
    }

    /* ===== KEY VOCABULARY ===== */
    .vocab {
      flex: 0 0 auto;
    }

    .vocab h3 {
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 6px;
    }

    .vocab-row {
      display: flex;
      gap: 12px;
      align-items: baseline;
      padding: 4px 0;
      border-bottom: 1px solid var(--grid);
    }

    .vocab-row:last-child {
      border-bottom: none;
    }

    .vocab-term {
      flex: 0 0 130px;
      font-size: 14px;
      color: var(--navy);
      font-weight: 700;
      letter-spacing: 1px;
    }

    .vocab-def {
      flex: 1;
      font-size: 12px;
      color: var(--ink);
      line-height: 1.35;
    }

    /* ===== DESCRIPTION ===== */
    .description {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
    }

    .description h4 {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 6px;
    }

    .description p {
      font-size: 15px;
      line-height: 1.5;
      color: var(--ink);
      margin-bottom: 10px;
    }

    .key-process {
      background: var(--soft-blue);
      border-left: 4px solid var(--navy);
      padding: 10px 14px;
      margin-top: 8px;
      font-size: 13px;
      line-height: 1.45;
      border-radius: 0 4px 4px 0;
    }

    .key-process strong {
      color: var(--navy);
      letter-spacing: 1px;
      text-transform: uppercase;
      font-size: 11px;
      display: block;
      margin-bottom: 4px;
    }

    /* ============================================================
       FOOTER — timeline + nav
       ============================================================ */
    footer {
      border-top: 2px solid var(--grid);
      padding-top: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    body.embed footer { display: none; }

    .timeline {
      flex: 1;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
      max-width: 700px;
    }

    .timeline::before {
      content: "";
      position: absolute;
      left: 12px;
      right: 12px;
      top: 50%;
      height: 2px;
      background: var(--grid);
      transform: translateY(-50%);
      z-index: 0;
    }

    .timeline-dot {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--paper);
      border: 2px solid var(--grid);
      cursor: pointer;
      position: relative;
      z-index: 1;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
    }

    .timeline-dot:hover {
      border-color: var(--accent);
      transform: scale(1.1);
    }

    .timeline-dot.active {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--paper);
      transform: scale(1.15);
    }

    .timeline-dot.visited:not(.active) {
      background: var(--soft-blue);
      border-color: var(--navy);
    }

    .nav-buttons {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    button.nav-btn {
      background: var(--navy);
      color: var(--paper);
      border: none;
      padding: 12px 24px;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.2s ease;
      min-width: 100px;
    }

    button.nav-btn:hover:not(:disabled) {
      background: var(--accent);
    }

    button.nav-btn:disabled {
      background: var(--grid);
      cursor: not-allowed;
      color: var(--muted);
    }

    .counter {
      font-size: 14px;
      color: var(--muted);
      font-weight: 700;
      letter-spacing: 2px;
      min-width: 50px;
      text-align: center;
    }

    /* ============================================================
       RESPONSIVE
       ============================================================ */
    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; }
      .stage-name { font-size: 24px; }
    }
  </style>
</head>

<body>

  <header>
    <div class="title-block">
      <div class="subtitle">Y8 Earth's Systems · Lesson 2</div>
      <h1>How Sedimentary Rocks (and Fossils) Form</h1>
    </div>
    <div class="header-meta">Millions of years in 6 stages</div>
  </header>

  <main>
    <!-- LEFT: scene illustration -->
    <div class="scene-wrap">
      <div class="scene-label">The journey · scene</div>
      <div class="scene-svg" id="sceneSvg">
        <!-- SVG injected here -->
      </div>
    </div>

    <!-- RIGHT: info panel -->
    <div class="info">
      <div class="stage-meta">
        <div class="stage-number" id="stageNumber">Stage 1 of 6</div>
        <div class="stage-name" id="stageName">Bare rock</div>
        <div class="stage-time" id="stageTime">Today</div>
        <div class="stage-tagline" id="stageTagline">A solid rock face exposed to the elements</div>
      </div>

      <div class="vocab">
        <h3>Key term this stage</h3>
        <div class="vocab-row">
          <div class="vocab-term" id="vocabTerm">—</div>
          <div class="vocab-def" id="vocabDef">—</div>
        </div>
      </div>

      <div class="description">
        <h4>What's happening</h4>
        <p id="descText">…</p>
        <div class="key-process">
          <strong>Teaching cue</strong>
          <span id="keyProcess">…</span>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <div class="timeline" id="timeline">
      <!-- dots injected here -->
    </div>
    <div class="nav-buttons">
      <button class="nav-btn" id="prevBtn">← Prev</button>
      <span class="counter" id="counter">1 / 6</span>
      <button class="nav-btn" id="nextBtn">Next →</button>
    </div>
  </footer>

  <script>
    // ============================================================
    // STAGE DATA
    // ============================================================
    const STAGES = [
      {
        number: "Stage 1 of 6",
        name: "Bare rock",
        time: "Starting point",
        tagline: "A solid rock face exposed to the elements",
        vocabTerm: "—",
        vocabDef: "(no new vocabulary yet — this is our starting condition)",
        description:
          "We start with a solid mass of rock — for example, a cliff face, a mountain, or exposed bedrock. " +
          "It has been stable for thousands or millions of years. There is no sediment yet. " +
          "But it is exposed to wind, rain, temperature changes, and the roots of any plants nearby. " +
          "Over time, that exposure starts to break the rock down.",
        keyProcess:
          "Ask pupils: \"What's going to break this rock down? Name three things.\" Cold-call for wind, rain, ice, plants, temperature change."
      },
      {
        number: "Stage 2 of 6",
        name: "Weathering",
        time: "Thousands of years",
        tagline: "The rock starts to break into smaller pieces",
        vocabTerm: "WEATHERING",
        vocabDef: "Rocks being broken into smaller pieces by physical or chemical processes — wind, water, ice, plant roots.",
        description:
          "Weathering is the first stage of the sedimentary process. The rock is broken DOWN — but not moved yet. " +
          "Water gets into tiny cracks, freezes, and expands, splitting the rock (freeze-thaw). Plant roots wedge into cracks and push them apart. " +
          "Rain that contains dissolved gases can chemically dissolve some rock. " +
          "Over many thousands of years, the rock face becomes covered in loose fragments — sediment.",
        keyProcess:
          "Distinguish weathering (breaking) from erosion (moving). Pupils often confuse the two. The rock is breaking apart but staying roughly where it is."
      },
      {
        number: "Stage 3 of 6",
        name: "Erosion",
        time: "Thousands to millions of years",
        tagline: "Broken pieces are carried away",
        vocabTerm: "EROSION",
        vocabDef: "The carrying-away of broken rock fragments by rivers, wind, glaciers, or gravity.",
        description:
          "Now the loose fragments are picked up and CARRIED AWAY by moving water (rivers, streams), wind, or ice. " +
          "Larger pieces tumble downhill; smaller pieces are washed away in rivers; the smallest particles are suspended in water and carried much further. " +
          "Eventually, most of the eroded material ends up in lakes, rivers, or — most commonly — at the bottom of the sea.",
        keyProcess:
          "Emphasise: most sedimentary rocks form in the SEA, because that's where most eroded material eventually ends up. This will matter when we talk about fossils later."
      },
      {
        number: "Stage 4 of 6",
        name: "Deposition",
        time: "Over millions of years",
        tagline: "Sediment settles in layers · life and death on the seabed",
        vocabTerm: "DEPOSITION",
        vocabDef: "Sediment SETTLING and being laid down somewhere — usually at the bottom of a sea, lake, or river.",
        description:
          "The water slows down, and the sediment it was carrying SETTLES out — heaviest pieces first, then progressively finer ones on top. " +
          "Layer after layer builds up on the seabed, with the newest at the top and the oldest at the bottom. " +
          "Meanwhile, sea creatures — fish, ammonites, plankton — live in the water above. When they die, their bodies sink. " +
          "If they get covered by sediment quickly enough, before being eaten or decomposing, they can be preserved.",
        keyProcess:
          "This is the moment to introduce fossils. Most dead things rot away. Only a tiny fraction get buried quickly enough to be preserved. That's why fossils are rare."
      },
      {
        number: "Stage 5 of 6",
        name: "Compaction",
        time: "Tens of millions of years",
        tagline: "The weight of newer layers crushes the older ones",
        vocabTerm: "COMPACTION",
        vocabDef: "Upper layers PRESS DOWN on lower layers, squashing the sediment and squeezing out water.",
        description:
          "As more and more sediment accumulates above, the lower layers get crushed under the weight. " +
          "Water is squeezed out. The grains pack more tightly together. " +
          "The buried fish — its soft parts long since decomposed, only the skeleton remaining — is now deep in the layers, slowly being pressed into the same shape it will keep for millions of years.",
        keyProcess:
          "Make the depth real for pupils: ask them to imagine 50 metres of mud and sand pressing down on something at the bottom. That's the pressure that turns sediment into rock."
      },
      {
        number: "Stage 6 of 6",
        name: "Cementation + uplift",
        time: "Hundreds of millions of years",
        tagline: "Solid sedimentary rock · fossil ready to be discovered",
        vocabTerm: "CEMENTATION",
        vocabDef: "Minerals dissolved in groundwater glue sediment grains together, forming solid rock.",
        description:
          "Water trickling through the buried sediment leaves behind minerals that act as a GLUE between the grains. " +
          "The sediment becomes solid rock — sedimentary rock. The fish skeleton has been replaced atom-by-atom by these same minerals, becoming a fossil — a rock copy of the original bones. " +
          "Much later, tectonic movement might LIFT this rock back to the surface, where erosion exposes it again — and a geologist hammering at the cliff finds the fossil. " +
          "The rock cycle continues.",
        keyProcess:
          "This connects to next chunk: the rock that was buried for hundreds of millions of years is now exposed at the surface again. Weathering can begin again. The cycle doesn't end."
      }
    ];

      // ----- 3. EROSION -----
      `<svg viewBox="0 0 600 360" xmlns="http://www.w3.org/2000/svg">

    // ============================================================
    // STATE & RENDER
    // ============================================================
    let currentStage = 0;
    let visited = new Set([0]);

    const els = {
      sceneSvg: document.getElementById("sceneSvg"),
      stageNumber: document.getElementById("stageNumber"),
      stageName: document.getElementById("stageName"),
      stageTime: document.getElementById("stageTime"),
      stageTagline: document.getElementById("stageTagline"),
      vocabTerm: document.getElementById("vocabTerm"),
      vocabDef: document.getElementById("vocabDef"),
      descText: document.getElementById("descText"),
      keyProcess: document.getElementById("keyProcess"),
      timeline: document.getElementById("timeline"),
      prevBtn: document.getElementById("prevBtn"),
      nextBtn: document.getElementById("nextBtn"),
      counter: document.getElementById("counter")
    };

    function renderTimeline() {
      els.timeline.innerHTML = "";
      STAGES.forEach((stage, i) => {
        const dot = document.createElement("div");
        dot.className = "timeline-dot";
        if (i === currentStage) dot.classList.add("active");
        if (visited.has(i)) dot.classList.add("visited");
        dot.textContent = (i + 1);
        dot.title = stage.name;
        dot.addEventListener("click", () => goToStage(i));
        els.timeline.appendChild(dot);
      });
    }

    function render() {
      const stage = STAGES[currentStage];

      // Animate scene swap
      els.sceneSvg.classList.add("transitioning");
      setTimeout(() => {
        els.sceneSvg.innerHTML = SCENES[currentStage];
        els.sceneSvg.classList.remove("transitioning");
      }, 175);

      els.stageNumber.textContent = stage.number;
      els.stageName.textContent = stage.name;
      els.stageTime.textContent = stage.time;
      els.stageTagline.textContent = stage.tagline;
      els.vocabTerm.textContent = stage.vocabTerm;
      els.vocabDef.textContent = stage.vocabDef;
      els.descText.textContent = stage.description;
      els.keyProcess.textContent = stage.keyProcess;

      renderTimeline();

      els.counter.textContent = (currentStage + 1) + " / " + STAGES.length;
      els.prevBtn.disabled = (currentStage === 0);
      els.nextBtn.disabled = (currentStage === STAGES.length - 1);
    }

    function goToStage(n) {
      if (n < 0 || n >= STAGES.length) return;
      currentStage = n;
      visited.add(n);
      render();
      updateURL();
    }

    function updateURL() {
      if (window.history && window.history.replaceState) {
        const params = new URLSearchParams(window.location.search);
        params.set("stage", currentStage + 1);
        const newUrl = window.location.pathname + "?" + params.toString() + window.location.hash;
        window.history.replaceState(null, "", newUrl);
      }
    }

    // ============================================================
    // EVENT LISTENERS
    // ============================================================
    els.prevBtn.addEventListener("click", () => goToStage(currentStage - 1));
    els.nextBtn.addEventListener("click", () => goToStage(currentStage + 1));

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft") { e.preventDefault(); goToStage(currentStage - 1); }
      else if (e.key === "ArrowRight" || e.key === " ") { e.preventDefault(); goToStage(currentStage + 1); }
      else if (e.key >= "1" && e.key <= "6") { goToStage(parseInt(e.key) - 1); }
    });

    // ============================================================
    // URL PARAM HANDLING
    // ============================================================
    function parseParams() {
      const params = new URLSearchParams(window.location.search);
      const hash = window.location.hash.replace(/^#/, "");
      const hashParams = new URLSearchParams(hash);

      const embed = params.get("embed") || hashParams.get("embed");
      if (embed === "1" || embed === "true") {
        document.body.classList.add("embed");
      }

      const stageParam = params.get("stage") || hashParams.get("stage");
      if (stageParam) {
        const n = parseInt(stageParam) - 1;
        if (!isNaN(n) && n >= 0 && n < STAGES.length) {
          currentStage = n;
          visited.add(n);
        }
      }
    }

    parseParams();
    render();
  </script>
