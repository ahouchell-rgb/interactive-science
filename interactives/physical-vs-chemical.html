<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Physical change or chemical reaction?</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#1E2761;--navy-soft:#2a3478;--warm:#F8F4EC;--warm-deep:#EFE8D6;--paper:#FCFAF4;
  --soft-blue:#EDF2FA;--ink:#1A1A1A;--muted:#5C6370;--rule:#CFD8E3;--accent:#B85042;
  --accent-soft:#F4DAD7;--success:#2C5F2D;--success-soft:#DDEBDD;--gold:#C8A24A;--gold-soft:#F2E6BD;
  --display:'Instrument Serif',Georgia,serif;--body:'IBM Plex Sans',system-ui,sans-serif;--mono:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--body);background:var(--paper);color:var(--ink);padding:16px;font-weight:300}
.wrap{max-width:700px;margin:0 auto}
.instr{font-size:14px;color:var(--muted);margin-bottom:12px;line-height:1.4}
.instr strong{color:var(--navy);font-weight:600}
.cardbox{background:var(--warm);border:1px solid var(--rule);border-radius:5px;padding:16px;text-align:center;margin-bottom:12px;min-height:118px;display:flex;flex-direction:column;justify-content:center}
.prog{font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.cardicon{font-size:34px;line-height:1;margin-bottom:6px}
.cardname{font-family:var(--display);font-size:26px;color:var(--navy);line-height:1.15}
.choices{display:flex;gap:10px;margin-bottom:12px}
.choices button{flex:1;font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;font-weight:500;
  background:var(--navy);color:var(--warm);border:1px solid var(--navy);padding:12px 8px;border-radius:3px;cursor:pointer;transition:all .18s}
.choices button:hover:not(:disabled){background:var(--accent);border-color:var(--accent)}
.choices button:disabled{opacity:.4;cursor:default}
.choices button:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
.feedback{min-height:62px;border-radius:4px;padding:12px 14px;font-size:14px;line-height:1.4;margin-bottom:12px;border:1px solid var(--rule);background:var(--soft-blue);color:var(--muted)}
.feedback.right{background:var(--success-soft);border-color:var(--success);color:var(--ink)}
.feedback.wrong{background:var(--accent-soft);border-color:var(--accent);color:var(--ink)}
.feedback b{font-weight:600}
.feedback .verdict{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;display:block;margin-bottom:4px}
.right .verdict{color:var(--success)} .wrong .verdict{color:var(--accent)}
.barrow{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px}
.score{font-family:var(--mono);font-size:12px;color:var(--navy);letter-spacing:.08em}
.score b{font-size:15px}
.nav{display:flex;gap:8px}
.nav button{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;font-weight:500;
  background:var(--paper);color:var(--navy);border:1px solid var(--rule);padding:9px 14px;border-radius:3px;cursor:pointer;transition:all .18s}
.nav button:hover:not(:disabled){background:var(--soft-blue);border-color:var(--navy)}
.nav button:disabled{opacity:.4;cursor:default}
.nav button:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
.take{font-family:var(--display);font-style:italic;font-size:17px;color:var(--navy);line-height:1.35;margin-top:8px;padding-top:10px;border-top:1px solid var(--rule)}
</style>
</head>
<body>
<div class="wrap">
  <p class="instr">For each example, decide: is it a <strong>physical change</strong> or a <strong>chemical reaction</strong>? You'll get instant feedback and a reason.</p>
  <div class="cardbox">
    <div class="prog" id="prog" aria-live="polite"></div>
    <div class="cardicon" id="cardicon" aria-hidden="true"></div>
    <div class="cardname" id="cardname"></div>
  </div>
  <div class="choices" role="group" aria-label="Classify this example">
    <button id="btnPhys">Physical change</button>
    <button id="btnChem">Chemical reaction</button>
  </div>
  <div class="feedback" id="feedback" aria-live="polite">Choose an answer above.</div>
  <div class="barrow">
    <div class="score">Score <b id="score">0</b> / <span id="total"></span></div>
    <div class="nav">
      <button id="next" disabled>Next ▸</button>
      <button id="restart">Restart</button>
    </div>
  </div>
  <p class="take">A chemical reaction makes a NEW substance; a physical change does not.</p>
</div>
<script>
"use strict";
const CARDS=[
  {n:'Ice melting',ic:'🧊',type:'phys',why:'Solid water becomes liquid water — same substance (H₂O), just a change of state.'},
  {n:'Wood burning',ic:'🔥',type:'chem',why:'Combustion makes new substances — carbon dioxide and water vapour — and releases energy.'},
  {n:'Dissolving sugar',ic:'🥄',type:'phys',why:'The sugar is still sugar, just spread through the water. You could evaporate it back.'},
  {n:'Iron rusting',ic:'🔩',type:'chem',why:'Iron reacts with oxygen and water to make a brand-new substance, iron oxide (rust).'},
  {n:'Mixing sand & water',ic:'🏖️',type:'phys',why:'No new substance forms — the sand and water are just mixed and can be separated again.'},
  {n:'Baking a cake',ic:'🍰',type:'chem',why:'Heat drives reactions that make new substances — the runny batter cannot be turned back.'},
  {n:'Boiling water',ic:'♨️',type:'phys',why:'Liquid water turns to steam — still H₂O, only the state has changed.'},
  {n:'Vinegar + baking soda',ic:'🧪',type:'chem',why:'They react to make new substances including carbon dioxide gas, which fizzes up.'},
  {n:'Magnesium burning',ic:'✨',type:'chem',why:'Magnesium reacts with oxygen to form a new white solid, magnesium oxide.'},
  {n:'Snapping a twig',ic:'🪵',type:'phys',why:'You only change its shape and size — it is still the same wood, no new substance.'}
];
let order=[], idx=0, score=0, answered=false;
const $=id=>document.getElementById(id);
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function start(){
  order=shuffle(CARDS.map((_,i)=>i)); idx=0; score=0;
  $('total').textContent=CARDS.length; $('score').textContent='0';
  show();
}
function show(){
  answered=false;
  const c=CARDS[order[idx]];
  $('prog').textContent='Card '+(idx+1)+' of '+CARDS.length;
  $('cardicon').textContent=c.ic;
  $('cardname').textContent=c.n;
  $('btnPhys').disabled=false; $('btnChem').disabled=false;
  $('next').disabled=true;
  const fb=$('feedback'); fb.className='feedback'; fb.textContent='Choose an answer above.';
}
function answer(pick){
  if(answered) return;
  answered=true;
  const c=CARDS[order[idx]];
  const correct=(pick===c.type);
  if(correct) score++;
  $('score').textContent=score;
  $('btnPhys').disabled=true; $('btnChem').disabled=true;
  const fb=$('feedback');
  const label=c.type==='phys'?'Physical change':'Chemical reaction';
  fb.className='feedback '+(correct?'right':'wrong');
  fb.innerHTML='<span class="verdict">'+(correct?'Correct':'Not quite')+'</span>'+
    '<b>'+c.n+'</b> is a <b>'+label.toLowerCase()+'</b>. '+c.why;
  $('next').disabled=false;
  if(idx>=CARDS.length-1) $('next').textContent='Finish';
}
$('btnPhys').addEventListener('click',()=>answer('phys'));
$('btnChem').addEventListener('click',()=>answer('chem'));
$('next').addEventListener('click',()=>{
  if(idx>=CARDS.length-1){
    const fb=$('feedback'); fb.className='feedback right';
    fb.innerHTML='<span class="verdict">All done</span>You scored <b>'+score+' / '+CARDS.length+'</b>. Press Restart to try again.';
    $('next').disabled=true;
    return;
  }
  idx++; $('next').textContent='Next ▸'; show();
});
$('restart').addEventListener('click',start);
start();
</script>
</body>
</html>
