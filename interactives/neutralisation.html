<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neutralisation</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#1E2761; --navy-soft:#2a3478; --warm:#F8F4EC; --warm-deep:#EFE8D6;
  --paper:#FCFAF4; --soft-blue:#EDF2FA; --ink:#1A1A1A; --muted:#5C6370;
  --rule:#CFD8E3; --accent:#B85042; --accent-soft:#F4DAD7; --success:#2C5F2D;
  --success-soft:#DDEBDD; --gold:#C8A24A; --gold-soft:#F2E6BD;
  --display:'Instrument Serif',Georgia,serif;
  --body:'IBM Plex Sans',system-ui,sans-serif;
  --mono:'IBM Plex Mono','Courier New',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{margin:0;background:var(--paper);font-family:var(--body);color:var(--ink);font-weight:300}
.wrap{max-width:700px;margin:0 auto;padding:16px 18px}
.instr{font-family:var(--mono);font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;text-align:center}
.stage{display:flex;gap:16px;align-items:stretch}
.beaker-col{flex:0 0 110px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end}
.beaker{position:relative;width:92px;height:130px;border:3px solid var(--navy);border-top:none;border-radius:0 0 16px 16px;background:var(--warm);overflow:hidden}
.beaker .rim{position:absolute;top:-3px;left:-7px;right:-7px;height:5px;border-top:3px solid var(--navy);border-radius:3px}
.liquid{position:absolute;left:0;right:0;bottom:0;height:72%;transition:background 0.3s ease;background:#C0392B}
.liquid::before{content:'';position:absolute;top:0;left:0;right:0;height:7px;background:rgba(255,255,255,0.25)}
.ph-readout{font-family:var(--display);font-size:30px;color:var(--navy);margin-top:8px}
.ph-readout small{font-size:12px;font-style:italic;color:var(--muted)}
.verdict{font-family:var(--mono);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:#fff;padding:3px 9px;border-radius:3px;margin-top:4px}
.chart-col{flex:1;min-width:0;display:flex;flex-direction:column}
canvas{width:100%;height:170px;display:block;border:1px solid var(--rule);background:var(--paper);border-radius:3px}
.eq{font-family:var(--display);font-size:18px;font-style:italic;color:var(--navy);text-align:center;margin:14px 0 4px;line-height:1.3}
.eq b{font-style:normal;font-weight:500;background:linear-gradient(180deg,transparent 60%,var(--gold-soft) 60%);padding:0 2px}
.btns{display:flex;gap:8px;justify-content:center;margin-top:12px;flex-wrap:wrap}
button{font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;background:var(--navy);color:var(--warm);border:none;padding:10px 16px;border-radius:3px;cursor:pointer;transition:background 0.2s}
button:hover,button:focus-visible{background:var(--accent);outline:none}
button:focus-visible{box-shadow:0 0 0 3px var(--gold-soft)}
button.alt{background:var(--warm-deep);color:var(--navy)}
button.alt:hover,button.alt:focus-visible{background:var(--gold-soft)}
button:disabled{opacity:0.4;cursor:not-allowed;background:var(--navy)}
.takeaway{font-family:var(--display);font-style:italic;font-size:18px;color:var(--muted);text-align:center;margin-top:16px;padding-top:14px;border-top:1px solid var(--rule)}
@media(max-width:430px){.beaker-col{flex:0 0 84px}.beaker{width:74px;height:108px}}
</style>
</head>
<body>
<div class="wrap">
  <p class="instr">Add alkali to the acid and watch the pH climb toward neutral</p>
  <div class="stage">
    <div class="beaker-col">
      <div class="beaker"><span class="rim"></span><div class="liquid" id="liquid"></div></div>
      <div class="ph-readout">pH <span id="phVal">1.0</span></div>
      <span class="verdict" id="verdict">Acid</span>
    </div>
    <div class="chart-col">
      <canvas id="chart" width="440" height="200" role="img" aria-label="Titration curve showing pH rising as alkali is added"></canvas>
    </div>
  </div>
  <p class="eq">acid + alkali → <b>salt</b> + <b>water</b></p>
  <div class="btns">
    <button id="addBtn" type="button">Add alkali ▸</button>
    <button id="add5Btn" type="button">Add a lot ▸▸</button>
    <button id="resetBtn" class="alt" type="button">Reset</button>
  </div>
  <p class="takeaway">Neutralisation makes a salt and water; at pH 7 the solution is neutral.</p>
</div>
<script>
(function(){
  var liquid=document.getElementById('liquid'),phVal=document.getElementById('phVal'),
      verdict=document.getElementById('verdict'),canvas=document.getElementById('chart'),
      ctx=canvas.getContext('2d');
  var colours=['#C0392B','#CB3A26','#E0561F','#E8743B','#F2A23D','#F2C73D','#D9D63B','#2E8B57','#2AA8A8','#2E9AC9','#2E78C9','#3B57C9','#5B3BB0','#6E2FA0','#7A2090'];
  var maxAdd=28;           // total drops to plot across
  var added=0;             // current drops added
  // S-shaped curve: start pH ~1, end pH ~13, steep near the midpoint
  function phAt(x){        // x = drops added 0..maxAdd
    var mid=maxAdd/2, k=0.55;
    var p=1+12/(1+Math.exp(-k*(x-mid)));
    return Math.max(0,Math.min(14,p));
  }
  function colourFor(p){
    var i=Math.round(p); if(i<0)i=0; if(i>14)i=14; return colours[i];
  }
  function draw(){
    var W=canvas.width,H=canvas.height,padL=34,padB=22,padT=10,padR=8;
    var plotW=W-padL-padR, plotH=H-padT-padB;
    ctx.clearRect(0,0,W,H);
    function X(x){return padL+(x/maxAdd)*plotW;}
    function Y(p){return padT+plotH-(p/14)*plotH;}
    // gridlines + y labels
    ctx.strokeStyle='#E2E8F0';ctx.lineWidth=1;ctx.fillStyle='#5C6370';
    ctx.font='9px "IBM Plex Mono",monospace';ctx.textAlign='right';ctx.textBaseline='middle';
    for(var p=0;p<=14;p+=7){
      ctx.beginPath();ctx.moveTo(padL,Y(p));ctx.lineTo(W-padR,Y(p));ctx.stroke();
      ctx.fillText('pH '+p,padL-4,Y(p));
    }
    // neutral line pH 7 highlighted
    ctx.strokeStyle='#2C5F2D';ctx.setLineDash([4,3]);ctx.beginPath();
    ctx.moveTo(padL,Y(7));ctx.lineTo(W-padR,Y(7));ctx.stroke();ctx.setLineDash([]);
    // axes
    ctx.strokeStyle='#9AA4B2';ctx.beginPath();
    ctx.moveTo(padL,padT);ctx.lineTo(padL,padT+plotH);ctx.lineTo(W-padR,padT+plotH);ctx.stroke();
    ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillText('alkali added →',padL+plotW/2,H-12);
    // full faint reference curve
    ctx.strokeStyle='#CFD8E3';ctx.lineWidth=1.5;ctx.beginPath();
    for(var x=0;x<=maxAdd;x+=0.5){var px=X(x),py=Y(phAt(x));if(x===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);}
    ctx.stroke();
    // drawn-so-far curve in accent
    ctx.strokeStyle='#B85042';ctx.lineWidth=2.5;ctx.beginPath();
    for(var x2=0;x2<=added;x2+=0.5){var qx=X(x2),qy=Y(phAt(x2));if(x2===0)ctx.moveTo(qx,qy);else ctx.lineTo(qx,qy);}
    ctx.stroke();
    // current point
    var cx=X(added),cy=Y(phAt(added));
    ctx.fillStyle='#1E2761';ctx.beginPath();ctx.arc(cx,cy,4,0,7);ctx.fill();
    // neutral flag at pH 7 crossing
    var fx=X(maxAdd/2);
    ctx.fillStyle='#2C5F2D';ctx.beginPath();ctx.arc(fx,Y(7),3,0,7);ctx.fill();
    ctx.fillStyle='#2C5F2D';ctx.font='9px "IBM Plex Mono",monospace';ctx.textAlign='left';ctx.textBaseline='bottom';
    ctx.fillText('⚑ neutral pH 7',fx+5,Y(7)-2);
  }
  function update(){
    var p=phAt(added);
    phVal.textContent=p.toFixed(1);
    liquid.style.background=colourFor(p);
    var label,col;
    if(p<6.5){label='Acid';col='#CB3A26';}
    else if(p<=7.5){label='Neutral';col='#2C5F2D';}
    else{label='Alkali';col='#2E78C9';}
    verdict.textContent=label;verdict.style.background=col;
    document.getElementById('addBtn').disabled=added>=maxAdd;
    document.getElementById('add5Btn').disabled=added>=maxAdd;
    draw();
  }
  document.getElementById('addBtn').addEventListener('click',function(){added=Math.min(maxAdd,added+2);update();});
  document.getElementById('add5Btn').addEventListener('click',function(){added=Math.min(maxAdd,added+7);update();});
  document.getElementById('resetBtn').addEventListener('click',function(){added=0;update();});
  update();
})();
</script>
</body>
</html>
