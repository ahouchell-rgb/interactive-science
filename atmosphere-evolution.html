<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>How Earth's Atmosphere Evolved</title>
  <style>
    /* ============================================================
       DESIGN TOKENS — matches Y8 lesson PowerPoint palette
       ============================================================ */
    :root {
      --navy: #1E2761;
      --ink: #1A1A1A;
      --muted: #5C6370;
      --paper: #FFFFFF;
      --warm: #F8F4EC;
      --soft-blue: #EDF2FA;
      --accent: #B85042;
      --accent-bg: #FBE8E4;
      --success: #2C5F2D;
      --success-bg: #E8F3E8;
      --grid: #CFD8E3;

      /* Gas colours (consistent across all stages) */
      --gas-n2:   #1E2761;  /* navy */
      --gas-o2:   #4A90D9;  /* sky blue */
      --gas-co2:  #B85042;  /* accent red */
      --gas-h2o:  #8FB8DE;  /* pale blue */
      --gas-other:#9AA5B8;  /* grey */

      --font: "Century Gothic", "Avenir Next", "Avenir", "Geneva", system-ui, -apple-system, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: var(--font);
      background: var(--paper);
      color: var(--ink);
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      padding: 24px 32px;
      gap: 16px;
    }

    /* ============================================================
       HEADER
       ============================================================ */
    header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      border-bottom: 2px solid var(--grid);
      padding-bottom: 10px;
    }
    body.embed header { display: none; }

    .title-block h1 {
      font-size: 28px;
      color: var(--navy);
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .title-block .subtitle {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: 700;
      margin-top: 2px;
    }

    .header-meta {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 700;
    }

    /* ============================================================
       MAIN LAYOUT
       ============================================================ */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      gap: 28px;
      min-height: 0;
    }

    /* ===== LEFT: scene illustration ===== */
    .scene-wrap {
      background: var(--warm);
      border: 1px solid var(--grid);
      border-radius: 6px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .scene-label {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 8px;
    }

    .scene-svg {
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .scene-svg svg {
      width: 100%;
      height: 100%;
      max-height: 100%;
      transition: opacity 0.35s ease;
    }

    .scene-svg.transitioning svg { opacity: 0.2; }

    /* ===== RIGHT: info panel ===== */
    .info {
      display: flex;
      flex-direction: column;
      min-height: 0;
      gap: 18px;
    }

    .stage-meta {
      padding-bottom: 12px;
      border-bottom: 2px solid var(--grid);
    }

    .time-period {
      font-size: 52px;
      color: var(--accent);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -1.5px;
      transition: color 0.35s ease;
    }

    .time-period .unit {
      font-size: 24px;
      color: var(--muted);
      margin-left: 6px;
      font-weight: 400;
      letter-spacing: 1px;
    }

    .stage-name {
      font-size: 26px;
      color: var(--navy);
      font-weight: 700;
      margin-top: 4px;
      letter-spacing: -0.3px;
    }

    .stage-tagline {
      font-size: 13px;
      color: var(--muted);
      font-style: italic;
      margin-top: 3px;
    }

    /* ===== ATMOSPHERE COMPOSITION BAR ===== */
    .composition {
      flex: 0 0 auto;
    }

    .composition h3 {
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 10px;
    }

    .bar-chart {
      width: 100%;
      height: 36px;
      background: var(--soft-blue);
      border-radius: 4px;
      border: 1px solid var(--grid);
      overflow: hidden;
      display: flex;
      position: relative;
    }

    .bar-segment {
      height: 100%;
      transition: width 0.5s ease;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      overflow: hidden;
      min-width: 0;
    }

    .bar-segment .seg-label {
      white-space: nowrap;
      padding: 0 6px;
    }

    .bar-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 10px;
      font-size: 12px;
      color: var(--ink);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .legend-swatch {
      width: 12px;
      height: 12px;
      border-radius: 2px;
      flex: 0 0 auto;
    }

    .legend-value {
      color: var(--muted);
      font-weight: 700;
      margin-left: 2px;
      transition: color 0.35s ease;
    }

    /* ===== DESCRIPTION ===== */
    .description {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
    }

    .description h4 {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 6px;
    }

    .description p {
      font-size: 16px;
      line-height: 1.55;
      color: var(--ink);
      margin-bottom: 10px;
    }

    .key-process {
      background: var(--soft-blue);
      border-left: 4px solid var(--navy);
      padding: 10px 14px;
      margin-top: 8px;
      font-size: 14px;
      line-height: 1.45;
      border-radius: 0 4px 4px 0;
    }

    .key-process strong {
      color: var(--navy);
      letter-spacing: 1px;
      text-transform: uppercase;
      font-size: 11px;
      display: block;
      margin-bottom: 4px;
    }

    /* ============================================================
       FOOTER — timeline + nav
       ============================================================ */
    footer {
      border-top: 2px solid var(--grid);
      padding-top: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    body.embed footer { display: none; }

    .timeline {
      flex: 1;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
      max-width: 700px;
    }

    .timeline::before {
      content: "";
      position: absolute;
      left: 12px;
      right: 12px;
      top: 50%;
      height: 2px;
      background: var(--grid);
      transform: translateY(-50%);
      z-index: 0;
    }

    .timeline-dot {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--paper);
      border: 2px solid var(--grid);
      cursor: pointer;
      position: relative;
      z-index: 1;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
    }

    .timeline-dot:hover {
      border-color: var(--accent);
      transform: scale(1.1);
    }

    .timeline-dot.active {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--paper);
      transform: scale(1.15);
    }

    .timeline-dot.visited:not(.active) {
      background: var(--soft-blue);
      border-color: var(--navy);
    }

    .nav-buttons {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    button.nav-btn {
      background: var(--navy);
      color: var(--paper);
      border: none;
      padding: 12px 24px;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.2s ease;
      min-width: 100px;
    }

    button.nav-btn:hover:not(:disabled) {
      background: var(--accent);
    }

    button.nav-btn:disabled {
      background: var(--grid);
      cursor: not-allowed;
      color: var(--muted);
    }

    .counter {
      font-size: 14px;
      color: var(--muted);
      font-weight: 700;
      letter-spacing: 2px;
      min-width: 50px;
      text-align: center;
    }

    /* ============================================================
       RESPONSIVE — accommodate projector aspect ratios
       ============================================================ */
    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; }
      .time-period { font-size: 44px; }
      .stage-name { font-size: 22px; }
    }
  </style>
</head>

<body>

  <header>
    <div class="title-block">
      <div class="subtitle">Y8 Earth's Systems · Lesson 3</div>
      <h1>How Earth's Atmosphere Evolved</h1>
    </div>
    <div class="header-meta">4.6 billion years of change</div>
  </header>

  <main>
    <!-- LEFT: scene illustration -->
    <div class="scene-wrap">
      <div class="scene-label">The Earth · scene</div>
      <div class="scene-svg" id="sceneSvg">
        <!-- SVG injected here -->
      </div>
    </div>

    <!-- RIGHT: info panel -->
    <div class="info">
      <div class="stage-meta">
        <div class="time-period" id="timePeriod">4.6 <span class="unit">bya</span></div>
        <div class="stage-name" id="stageName">Hadean Earth</div>
        <div class="stage-tagline" id="stageTagline">Molten surface · No oceans · No life</div>
      </div>

      <div class="composition">
        <h3>Atmosphere composition</h3>
        <div class="bar-chart" id="barChart">
          <!-- segments injected here -->
        </div>
        <div class="bar-legend" id="barLegend">
          <!-- legend injected here -->
        </div>
      </div>

      <div class="description">
        <h4>What was happening</h4>
        <p id="descText">…</p>
        <div class="key-process">
          <strong>Key process</strong>
          <span id="keyProcess">…</span>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <div class="timeline" id="timeline">
      <!-- dots injected here -->
    </div>
    <div class="nav-buttons">
      <button class="nav-btn" id="prevBtn">← Prev</button>
      <span class="counter" id="counter">1 / 6</span>
      <button class="nav-btn" id="nextBtn">Next →</button>
    </div>
  </footer>

  <script>
    // ============================================================
    // STAGE DATA
    // Percentages are approximate but defensible.
    // Order: N₂, O₂, CO₂, H₂O vapour, Other (Ar etc.)
    // ============================================================
    const STAGES = [
      {
        time: "4.6",
        unit: "bya",
        name: "Hadean Earth",
        tagline: "Molten surface · No oceans · No life",
        composition: { N2: 3, O2: 0, CO2: 80, H2O: 15, Other: 2 },
        description:
          "Earth has just formed. The surface is partly molten, with thousands of active volcanoes. " +
          "There are no oceans — water exists only as vapour because the surface is too hot for liquid water. " +
          "There is no life. The air is dominated by carbon dioxide and steam, both released by volcanic eruptions.",
        keyProcess:
          "Volcanic outgassing. Eruptions release CO₂, water vapour, and nitrogen into a thin, hot atmosphere."
      },
      {
        time: "3.8",
        unit: "bya",
        name: "Cooling Earth",
        tagline: "Oceans form · Atmosphere thickens",
        composition: { N2: 15, O2: 0, CO2: 75, H2O: 8, Other: 2 },
        description:
          "The Earth has cooled. Water vapour in the atmosphere has condensed and fallen as rain, forming the first oceans. " +
          "The atmosphere is still mostly carbon dioxide, but the new oceans begin to dissolve some of it. " +
          "Nitrogen continues to accumulate. There is still no oxygen and no life on the surface.",
        keyProcess:
          "Condensation. As Earth cools, water vapour becomes liquid → rain → oceans. CO₂ begins to dissolve into seawater."
      },
      {
        time: "3.5",
        unit: "bya",
        name: "First Photosynthesisers",
        tagline: "Cyanobacteria appear · Stromatolites form",
        composition: { N2: 25, O2: 0.1, CO2: 65, H2O: 8, Other: 1.9 },
        description:
          "Microscopic life has evolved in the oceans. Cyanobacteria — single-celled organisms — start to photosynthesise, taking in CO₂ and releasing O₂. " +
          "But the oceans contain huge amounts of dissolved iron, which reacts with the new oxygen and locks it away as rust on the seafloor. " +
          "These iron deposits become the Banded Iron Formations (BIFs) of the Pilbara.",
        keyProcess:
          "Photosynthesis begins. O₂ is produced but trapped by iron in seawater — almost none reaches the atmosphere yet."
      },
      {
        time: "2.4",
        unit: "bya",
        name: "Great Oxidation Event",
        tagline: "Free oxygen finally accumulates",
        composition: { N2: 60, O2: 5, CO2: 25, H2O: 8, Other: 2 },
        description:
          "After hundreds of millions of years, the oceans are saturated — no more dissolved iron remains to react with the O₂ being produced. " +
          "For the first time, free oxygen escapes into the atmosphere and builds up. " +
          "This moment is called the Great Oxidation Event. It will eventually make complex life possible — but it kills off most existing microbes, for which oxygen is toxic.",
        keyProcess:
          "Saturation. Oceans absorb no more O₂. Excess oxygen accumulates in the air for the first time."
      },
      {
        time: "0.5",
        unit: "bya",
        name: "Plants Colonise Land",
        tagline: "Complex life · Forests appear",
        composition: { N2: 75, O2: 18, CO2: 0.5, H2O: 5, Other: 1.5 },
        description:
          "Complex life has exploded in the oceans (the Cambrian explosion) and plants have begun to spread onto land. " +
          "Vast forests of early plants photosynthesise on a global scale, pulling CO₂ from the air and pumping out oxygen. " +
          "The atmosphere is approaching its modern composition. The sky is recognisably blue. " +
          "Animals — fish, then amphibians, then reptiles — follow plants onto land.",
        keyProcess:
          "Global photosynthesis. Land plants and marine algae together drive O₂ up and CO₂ down toward modern values."
      },
      {
        time: "Today",
        unit: "",
        name: "Modern Atmosphere",
        tagline: "Stable composition · Until recently",
        composition: { N2: 78, O2: 21, CO2: 0.04, H2O: 0.5, Other: 0.46 },
        description:
          "Earth's atmosphere has been remarkably stable for roughly 500 million years: about 78% nitrogen, 21% oxygen, and 1% other (mostly argon). " +
          "Carbon dioxide is only ~0.04% — a tiny fraction. " +
          "Today, humans burning fossil fuels are returning CO₂ to the air — carbon locked away hundreds of millions of years ago by the plants that became coal, oil and gas.",
        keyProcess:
          "Balance. The atmosphere we breathe took 4.6 billion years to form — and is now changing again, faster than ever."
      }
    ];

    // Gas colour mapping
    const GAS_COLOURS = {
      N2: "var(--gas-n2)",
      O2: "var(--gas-o2)",
      CO2: "var(--gas-co2)",
      H2O: "var(--gas-h2o)",
      Other: "var(--gas-other)"
    };

    const GAS_LABELS = {
      N2: "Nitrogen (N₂)",
      O2: "Oxygen (O₂)",
      CO2: "Carbon dioxide (CO₂)",
      H2O: "Water vapour",
      Other: "Other"
    };

    const GAS_SHORT = {
      N2: "N₂",
      O2: "O₂",
      CO2: "CO₂",
      H2O: "H₂O",
      Other: "Ar etc."
    };

    // ============================================================
    // SVG SCENES — one per stage
    // viewBox 600 × 360 (1.67:1 landscape)
    // ============================================================
    const SCENES = [
      // ----- 1. HADEAN -----
      `<svg viewBox="0 0 600 360" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="hadeanSky" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#3a0e08"/>
            <stop offset="100%" stop-color="#7a1f0a"/>
          </linearGradient>
          <radialGradient id="hadeanSun" cx="0.5" cy="0.5">
            <stop offset="0%" stop-color="#ffd000"/>
            <stop offset="60%" stop-color="#ff7a00"/>
            <stop offset="100%" stop-color="#ff7a00" stop-opacity="0"/>
          </radialGradient>
          <linearGradient id="hadeanGround" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#5a1810"/>
            <stop offset="100%" stop-color="#2a0a05"/>
          </linearGradient>
        </defs>
        <!-- sky -->
        <rect x="0" y="0" width="600" height="220" fill="url(#hadeanSky)"/>
        <!-- harsh sun -->
        <circle cx="450" cy="80" r="55" fill="url(#hadeanSun)"/>
        <circle cx="450" cy="80" r="28" fill="#ffea7a"/>
        <!-- asteroid -->
        <circle cx="120" cy="50" r="6" fill="#888"/>
        <line x1="120" y1="50" x2="80" y2="20" stroke="#ffaa44" stroke-width="2"/>
        <!-- volcanic mountains -->
        <polygon points="0,220 100,140 180,220" fill="url(#hadeanGround)"/>
        <polygon points="150,220 230,100 310,220" fill="url(#hadeanGround)"/>
        <polygon points="280,220 380,150 460,220" fill="url(#hadeanGround)"/>
        <polygon points="430,220 520,170 600,220" fill="url(#hadeanGround)"/>
        <!-- lava on volcano tops -->
        <polygon points="220,110 230,100 245,110 240,125 230,118 220,125" fill="#ff5a00"/>
        <polygon points="370,160 380,150 395,160 388,175" fill="#ff5a00"/>
        <!-- ground -->
        <rect x="0" y="220" width="600" height="140" fill="url(#hadeanGround)"/>
        <!-- lava rivers -->
        <path d="M 230,125 Q 240,180 230,260 Q 215,310 240,360" stroke="#ff7a00" stroke-width="5" fill="none"/>
        <path d="M 380,175 Q 390,220 370,290 Q 360,330 380,360" stroke="#ff7a00" stroke-width="4" fill="none"/>
        <!-- ash particles -->
        <circle cx="230" cy="80" r="2" fill="#ffaa44" opacity="0.7"/>
        <circle cx="245" cy="60" r="1.5" fill="#ffaa44" opacity="0.6"/>
        <circle cx="380" cy="120" r="2" fill="#ffaa44" opacity="0.7"/>
        <circle cx="395" cy="100" r="1.5" fill="#ffaa44" opacity="0.6"/>
      </svg>`,

      // ----- 2. COOLING / OCEANS -----
      `<svg viewBox="0 0 600 360" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="coolSky" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#4a4f5e"/>
            <stop offset="100%" stop-color="#7a8290"/>
          </linearGradient>
          <linearGradient id="coolOcean" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#4a6280"/>
            <stop offset="100%" stop-color="#2a3e58"/>
          </linearGradient>
          <linearGradient id="coolGround" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#5a4a3a"/>
            <stop offset="100%" stop-color="#3a2e22"/>
          </linearGradient>
        </defs>
        <!-- overcast sky -->
        <rect x="0" y="0" width="600" height="220" fill="url(#coolSky)"/>
        <!-- dim sun behind clouds -->
        <circle cx="450" cy="80" r="40" fill="#d8c47a" opacity="0.5"/>
        <!-- steam/cloud bands -->
        <ellipse cx="200" cy="90" rx="120" ry="14" fill="#9aa5b8" opacity="0.7"/>
        <ellipse cx="380" cy="65" rx="100" ry="10" fill="#9aa5b8" opacity="0.6"/>
        <ellipse cx="500" cy="120" rx="80" ry="8" fill="#9aa5b8" opacity="0.6"/>
        <!-- distant volcanoes (fewer, smaller) -->
        <polygon points="20,220 80,160 140,220" fill="url(#coolGround)"/>
        <polygon points="400,220 460,180 520,220" fill="url(#coolGround)"/>
        <!-- glow at volcano tops (dimmer) -->
        <polygon points="73,170 80,160 90,170 85,180" fill="#cc5a30"/>
        <!-- steam rising from volcanoes -->
        <path d="M 80,160 Q 78,140 82,120 Q 84,108 80,90" stroke="#9aa5b8" stroke-width="3" fill="none" opacity="0.7"/>
        <path d="M 460,180 Q 458,160 462,140 Q 464,128 460,110" stroke="#9aa5b8" stroke-width="3" fill="none" opacity="0.7"/>
        <!-- new ocean -->
        <rect x="0" y="220" width="600" height="140" fill="url(#coolOcean)"/>
        <!-- gentle wave lines -->
        <path d="M 0,250 Q 100,245 200,250 T 400,250 T 600,250" stroke="#6a8298" stroke-width="1.5" fill="none" opacity="0.7"/>
        <path d="M 0,280 Q 100,275 200,280 T 400,280 T 600,280" stroke="#6a8298" stroke-width="1.5" fill="none" opacity="0.5"/>
        <path d="M 0,310 Q 100,305 200,310 T 400,310 T 600,310" stroke="#6a8298" stroke-width="1.5" fill="none" opacity="0.4"/>
        <!-- rain falling (water cycle) -->
        <line x1="200" y1="105" x2="195" y2="200" stroke="#8fb8de" stroke-width="1" opacity="0.6"/>
        <line x1="230" y1="105" x2="225" y2="200" stroke="#8fb8de" stroke-width="1" opacity="0.6"/>
        <line x1="260" y1="105" x2="255" y2="200" stroke="#8fb8de" stroke-width="1" opacity="0.6"/>
        <line x1="180" y1="105" x2="175" y2="200" stroke="#8fb8de" stroke-width="1" opacity="0.5"/>
        <line x1="250" y1="105" x2="245" y2="200" stroke="#8fb8de" stroke-width="1" opacity="0.5"/>
      </svg>`,

      // ----- 3. CYANOBACTERIA -----
      `<svg viewBox="0 0 600 360" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="cyanoSky" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#a8a07a"/>
            <stop offset="100%" stop-color="#d4c89a"/>
          </linearGradient>
          <linearGradient id="cyanoOcean" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#5a8290"/>
            <stop offset="50%" stop-color="#4a7585"/>
            <stop offset="100%" stop-color="#6a5040"/>
          </linearGradient>
          <linearGradient id="cyanoSeabed" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#8a4530"/>
            <stop offset="100%" stop-color="#5a2818"/>
          </linearGradient>
        </defs>
        <!-- pale sky -->
        <rect x="0" y="0" width="600" height="160" fill="url(#cyanoSky)"/>
        <!-- pale sun -->
        <circle cx="450" cy="60" r="35" fill="#f0d878" opacity="0.8"/>
        <!-- horizon -->

    // ============================================================
    // STATE & RENDER
    // ============================================================
    let currentStage = 0;
    let visited = new Set([0]);

    const els = {
      sceneSvg: document.getElementById("sceneSvg"),
      timePeriod: document.getElementById("timePeriod"),
      stageName: document.getElementById("stageName"),
      stageTagline: document.getElementById("stageTagline"),
      barChart: document.getElementById("barChart"),
      barLegend: document.getElementById("barLegend"),
      descText: document.getElementById("descText"),
      keyProcess: document.getElementById("keyProcess"),
      timeline: document.getElementById("timeline"),
      prevBtn: document.getElementById("prevBtn"),
      nextBtn: document.getElementById("nextBtn"),
      counter: document.getElementById("counter")
    };

    function renderBarChart(composition) {
      const gases = ["N2", "O2", "CO2", "H2O", "Other"];
      els.barChart.innerHTML = "";
      gases.forEach((gas) => {
        const pct = composition[gas];
        const seg = document.createElement("div");
        seg.className = "bar-segment";
        seg.style.background = GAS_COLOURS[gas];
        seg.style.width = pct + "%";
        // Only show label inside if segment is wide enough
        if (pct >= 13) {
          const lbl = document.createElement("span");
          lbl.className = "seg-label";
          lbl.textContent = GAS_SHORT[gas] + " " + pct + "%";
          seg.appendChild(lbl);
        }
        els.barChart.appendChild(seg);
      });
    }

    function renderLegend(composition) {
      const gases = ["N2", "O2", "CO2", "H2O", "Other"];
      els.barLegend.innerHTML = "";
      gases.forEach((gas) => {
        const item = document.createElement("div");
        item.className = "legend-item";
        const sw = document.createElement("span");
        sw.className = "legend-swatch";
        sw.style.background = GAS_COLOURS[gas];
        const txt = document.createElement("span");
        txt.textContent = GAS_LABELS[gas];
        const val = document.createElement("span");
        val.className = "legend-value";
        const pct = composition[gas];
        val.textContent = (pct < 1 && pct > 0) ? pct.toFixed(2) + "%" : pct + "%";
        item.appendChild(sw);
        item.appendChild(txt);
        item.appendChild(val);
        els.barLegend.appendChild(item);
      });
    }

    function renderTimeline() {
      els.timeline.innerHTML = "";
      STAGES.forEach((stage, i) => {
        const dot = document.createElement("div");
        dot.className = "timeline-dot";
        if (i === currentStage) dot.classList.add("active");
        if (visited.has(i)) dot.classList.add("visited");
        dot.textContent = (i + 1);
        dot.title = stage.name + " (" + stage.time + " " + stage.unit + ")";
        dot.addEventListener("click", () => goToStage(i));
        els.timeline.appendChild(dot);
      });
    }

    function render() {
      const stage = STAGES[currentStage];

      // Animate scene swap
      els.sceneSvg.classList.add("transitioning");
      setTimeout(() => {
        els.sceneSvg.innerHTML = SCENES[currentStage];
        els.sceneSvg.classList.remove("transitioning");
      }, 175);

      els.timePeriod.innerHTML = stage.time +
        (stage.unit ? '<span class="unit">' + stage.unit + '</span>' : "");
      els.stageName.textContent = stage.name;
      els.stageTagline.textContent = stage.tagline;
      els.descText.textContent = stage.description;
      els.keyProcess.textContent = stage.keyProcess;

      renderBarChart(stage.composition);
      renderLegend(stage.composition);
      renderTimeline();

      els.counter.textContent = (currentStage + 1) + " / " + STAGES.length;
      els.prevBtn.disabled = (currentStage === 0);
      els.nextBtn.disabled = (currentStage === STAGES.length - 1);
    }

    function goToStage(n) {
      if (n < 0 || n >= STAGES.length) return;
      currentStage = n;
      visited.add(n);
      render();
      updateURL();
    }

    function updateURL() {
      if (window.history && window.history.replaceState) {
        const params = new URLSearchParams(window.location.search);
        params.set("stage", currentStage + 1);
        const newUrl = window.location.pathname + "?" + params.toString() + window.location.hash;
        window.history.replaceState(null, "", newUrl);
      }
    }

    // ============================================================
    // EVENT LISTENERS
    // ============================================================
    els.prevBtn.addEventListener("click", () => goToStage(currentStage - 1));
    els.nextBtn.addEventListener("click", () => goToStage(currentStage + 1));

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft") { e.preventDefault(); goToStage(currentStage - 1); }
      else if (e.key === "ArrowRight" || e.key === " ") { e.preventDefault(); goToStage(currentStage + 1); }
      else if (e.key >= "1" && e.key <= "6") { goToStage(parseInt(e.key) - 1); }
    });

    // ============================================================
    // URL PARAM HANDLING
    // ============================================================
    function parseParams() {
      const params = new URLSearchParams(window.location.search);
      // also accept hash params (for older embed patterns)
      const hash = window.location.hash.replace(/^#/, "");
      const hashParams = new URLSearchParams(hash);

      const embed = params.get("embed") || hashParams.get("embed");
      if (embed === "1" || embed === "true") {
        document.body.classList.add("embed");
      }

      const stageParam = params.get("stage") || hashParams.get("stage");
      if (stageParam) {
        const n = parseInt(stageParam) - 1;
        if (!isNaN(n) && n >= 0 && n < STAGES.length) {
          currentStage = n;
          visited.add(n);
        }
      }
    }

    parseParams();
    render();
  </script>
